<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/login.css">
</head>
<body>
    <div class="login-container">
        <!-- Logotipo simulado do gov.br -->
        <div class="gov-logo">Facilita<span>Saúde</span></div>
        
        <h2>Identifique-se no gov.br</h2>
        <p class="subtitle">Digite seus dados pessoais para acessar sua conta única.</p>

        <form action="/cadastro/" method="POST">
            {% csrf_token %}
            <div class="input-field">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" maxlength="14" required>
            </div>
            
            <div class="input-field">
                <label for="rg">RG</label>
                <input type="text" id="rg" name="rg" placeholder="00.000.000-0" maxlength="12" required>
            </div>

            <div class="input-field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required>
            </div>
            
            <div class="input-field">
                <label for="password">Senha</label>
                <input type="password" id="password" name="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="login-btn">Avançar</button>
        </form>

        <div class="gov-links">
            <a href="/password.html">Esqueci minha senha</a>
            <a href="/privacidade.html">Termos de uso e privacidade</a>
        </div>
    </div>
</body>
</html>
