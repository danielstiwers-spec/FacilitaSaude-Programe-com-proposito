<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Rotina</title>
    <link rel="stylesheet" href="rotina.css">
    <!-- Importação do Chart.js que você já utiliza -->
    <script src="https://jsdelivr.net"></script>
    <!-- Nosso script com as funções interativas -->
    <script src="rotina.js" defer></script>
</head>
<body>

    <!-- Barra Superior -->
    <div class="gov-header-bar">
        <span>BRASIL.PR.GOV.BR</span>
    </div>

    <!-- Cabeçalho -->
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo-placeholder">Facilita<span>Saúde</span></a>
            <span class="app-badge">Meu Diário de Saúde</span>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="main-container">
        <div class="page-header">
            <h1>Acompanhamento da Rotina</h1>
            <p>Monitore suas metas de bem-estar e registre seus hábitos de hoje.</p>
        </div>

        <div class="rotina-grid">
            
            <!-- Card 1 - Ingestão de Água -->
            <div class="rotina-card">
                <h3>Registro de Água</h3>
                <div class="meta-progresso">
                    <div class="barra-fundo">
                        <!-- A ID permite o controle da largura via JS -->
                        <div id="barraAgua" class="barra-sucesso" style="width: 0%;"></div>
                    </div>
                    <!-- IDs para atualizar os textos -->
                    <span class="meta-texto"><strong id="qtdAtual">0L</strong> de <span id="metaTotal">2.0L</span> (<span id="porcentagemTexto">0%</span> atingido)</span>
                </div>
                <div class="botoes-registro">
                    <button class="btn-adicionar" onclick="adicionarAgua()">+ 250ml</button>
                    <button class="btn-resetar" onclick="resetarAgua()" title="Resetar progresso">🔄</button>
                </div>
            </div>

            <!-- Card 2 - Histórico de Sono com Gráfico-->
            <div class="rotina-card">
                <h3>Histórico de Sono</h3>
                <p style="font-size: 13px; color: #718096; margin-bottom: 15px;">Média recomendada: 8h a 9h por noite.</p>
                <div class="chart-container">
                    <canvas id="sonoRotinaChart"></canvas>
                </div>
            </div>

            <!-- Card 3 - Check-list-->
            <div class="rotina-card habitos-card">
                <h3>Hábitos de Hoje</h3>
                <ul class="lista-habitos">
                    <li>
                        <label class="habito-item">
                            <input type="checkbox">
                            <span>Tomar café da manhã</span>
                        </label>
                    </li>
                    <li>
                        <label class="habito-item">
                            <input type="checkbox">
                            <span>Praticar 30 min de atividade física</span>
                        </label>
                    </li>
                    <li>
                        <label class="habito-item">
                            <input type="checkbox">
                            <span>Meditação ou pausa</span>
                        </label>
                    </li>
                    <li>
                        <label class="habito-item">
                            <input type="checkbox">
                            <span>Evitar telas 1h antes de dormir</span>
                        </label>
                    </li>
                </ul>
            </div>

        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 FacilitaSaúde</p>
    </footer>

</body>
</html>
