<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Acesso</title>
    <link rel="stylesheet" href="password.css">
</head>
<body>

    <!-- Barra institucional simplificada -->
    <header class="gov-header">
        <span>FacilitaSaúde</span>
    </header>

    <main class="main-content">
        <div class="gov-card">
            <h1>Recuperar Conta</h1>
            <p>Informe o e-mail cadastrado no seu perfil para receber as orientações de redefinição de acesso.</p>
            
            <form action="/auth/recuperar" method="POST">
                <div class="form-group">
                    <label for="email">Endereço de E-mail</label>
                    <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required>
                </div>
                
                <button type="submit" class="btn-gov">Continuar</button>
            </form>

            <div class="links-container">
                <a href="login.html" class="gov-link">Voltar</a>
            </div>
        </div>
    </main>

</body>
</html>
