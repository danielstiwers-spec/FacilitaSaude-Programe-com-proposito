<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - FacilitaSaúde</title>
    <link rel="stylesheet" href="../CSS/contato.css">
</head>
<body>
    <div class="contact-container">
        <!-- Cabeçalho integrado FacilitaSaúde + Estilo gov -->
        <div class="brand-logo">Facilita<span>Saúde</span></div>
        
        <h2>Fale Conosco</h2>
        <p class="subtitle">Preencha os dados abaixo para enviar sua dúvida, sugestão ou reclamação para nossa equipe de suporte.</p>

        <form>
            <div class="input-field">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome completo" required>
            </div>

            <div class="input-field">
                <label for="email">E-mail de Contato</label>
                <input type="email" id="email" placeholder="nome@exemplo.com" required>
            </div>

            <div class="input-field">
                <label for="assunto">Assunto</label>
                <select id="assunto" required>
                    <option value="" disabled selected>Selecione uma opção</option>
                    <option value="duvida">Dúvidas sobre Serviços</option>
                    <option value="suporte">Suporte Técnico</option>
                    <option value="reclamacao">Reclamações</option>
                    <option value="elogio">Elogios e Sugestões</option>
                </select>
            </div>

            <div class="input-field">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" rows="5" placeholder="Digite sua mensagem..." required></textarea>
            </div>

            <button type="submit" class="submit-btn">Enviar Mensagem</button>
        </form>

        <div class="gov-footer-links">
            <a href="index.html">Voltar para a página inicial</a>
            <a href="politicas-atendimento.html">Políticas de Atendimento</a>
        </div>
    </div>
</body>
</html>
